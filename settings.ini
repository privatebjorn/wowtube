[server]
tcp_port     = 40123
ftp_port     = 40124
host         = 0.0.0.0
max_clients  = 10
log_level    = INFO

[paths]
video_store  = ./videos
thumb_store  = ./thumbs
user_db_dir  = ./userdata
log_dir      = ./logs

[ftp]
ftp_user     = share
ftp_password = NetShare123

[thumbnails]
width        = 160
height       = 90

[workers]
thread_count = 4

; ---------------------------------------------------------------------------
; Format definitions
; Each key becomes the wire format identifier (e.g. qt_20k).
; Fields (pipe-separated):
;   human_label | ffmpeg_args | extension | max_source_res_p
; ---------------------------------------------------------------------------
[formats]
qt_20k  = QT Dial-up 20k  | -vf "scale=160:120,fps=12" -c:v svq1 -b:v 20k -maxrate 20k -bufsize 40k -g 300 -bf 0 -c:a adpcm_ima_qt -ar 11025 -ac 1 -movflags +faststart | .mov | 480
qt_40k  = QT 40k Broadband| -vf "scale=240:180,fps=15" -c:v svq1 -b:v 40k -maxrate 40k -bufsize 80k -g 300 -bf 0 -c:a adpcm_ima_qt -ar 11025 -ac 1 -movflags +faststart | .mov | 480
wmv_360p = WMV 360p Broadband | -vf "scale=640:360,fps=24" -c:v msmpeg4v3 -b:v 800k -maxrate 1000k -bufsize 2M -g 300 -c:a wmav2 -b:a 128k -ar 44100 -ac 2 | .wmv | 480
mp3_128 = MP3 Audio 128k  | -vn -c:a libmp3lame -b:a 128k                                                                                                              | .mp3 | 480